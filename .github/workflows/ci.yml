name: Backend CI/CD

# Define the triggers (the State Machine transitions)
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# We need these permissions to push to the GitHub Container Registry
permissions:
  contents: read
  packages: write

# Define the environment working directory for all steps
defaults:
  run:
    working-directory: ./backend

jobs:
  build-test-lint:
    # Use the latest Ubuntu ephemeral runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the DAG at this specific commit
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup the Go toolchain
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # UPGRADED: Now matching your local machine's modern Go compiler
        go-version: '1.26.x' 
        cache-dependency-path: backend/go.mod

    # 3. Fail Fast: Run the Linter
    # We use golangci-lint, the industry standard meta-linter for Go
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        # UPGRADED: Always pull the newest linter to support modern Go versions
        version: latest
        working-directory: backend
        args: --timeout=3m


    # 4. Run the Unit Tests
    - name: Run Unit Tests
      # -v enables verbose output, -race detects concurrent memory data races
      run: go test -v -race ./...

    # 5. Verify the code actually compiles
    - name: Verify Build
      run: CGO_ENABLED=0 GOOS=linux go build -o /dev/null main.go

  # Deploy to GHCR (Only runs on the 'main' branch if tests pass)
  publish-docker-image:
    needs: build-test-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        # github.actor is an automatic variable containing your username
        username: ${{ github.actor }}
        # GITHUB_TOKEN is an automatic secure token provided by GitHub Actions
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        # Notice we are targeting the backend directory where the Dockerfile lives
        context: ./backend
        push: true
        # REPLACE THIS WITH YOUR ACTUAL USERNAME (MUST BE LOWERCASE)
        tags: ghcr.io/k-codz/telemetry-api:latest