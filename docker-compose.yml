services:
  db:
    # We use Alpine linux tags to keep the image footprint as small as possible
    image: postgres:15-alpine
    container_name: telemetry-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: telemetry
    ports:
      # Maps port 5432 on your Windows host to port 5432 in the container
      - "5432:5432"
    volumes:
      # Maps the named volume 'pgdata' to the container's internal storage path
      # This ensures data survives container destruction
      - pgdata:/var/lib/postgresql/data

volumes:
  # Declares the named volume managed by Docker
  pgdata: