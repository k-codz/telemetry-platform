# This file configures the NGINX core engine
events {
    # Max connections per worker process
    worker_connections 1024;
}

http {
    # ==========================================
    # RATE LIMITING ZONE
    # ==========================================
    # $binary_remote_addr: We track requests by the client's IP address.
    # zone=api_limit:10m: We allocate 10 Megabytes of RAM to store IP states (tracks ~160,000 IPs).
    # rate=10r/m: We allow a sustained rate of 10 requests per minute (1 every 6 seconds).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

    server {
        # The Gateway listens on standard HTTP Port 80
        listen 80;

        location / {
            # ==========================================
            # APPLY RATE LIMIT
            # ==========================================
            # burst=2: Allow up to 2 requests to spike instantly above the rate limit.
            # nodelay: If they exceed the burst, reject immediately instead of queueing.
            limit_req zone=api_limit burst=2 nodelay;
            
            # Custom error status (503 Service Unavailable by default, 429 is industry standard)
            limit_req_status 429;

            # ==========================================
            # REVERSE PROXY TO GO API
            # ==========================================
            # Docker Desktop maps host.docker.internal to your Windows localhost.
            # This allows NGINX (in Docker) to forward traffic to Go (in PowerShell).
            proxy_pass http://host.docker.internal:8080;
            
            # Pass original client information to the Go API
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}